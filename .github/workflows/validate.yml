name: validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # renovate will SHA-pin this once it runs
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Validate every preset (strict)
        run: npx --yes --package renovate -- renovate-config-validator --strict
