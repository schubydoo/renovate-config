name: validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.4.0 # renovate will SHA-pin this once it runs
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: lts/*
      - name: Validate every preset (strict)
        run: |
          files=$(git ls-files '*.json')
          echo "Validating:"; echo "$files" | sed 's/^/  - /'
          npx --yes --package renovate -- renovate-config-validator --strict $files
